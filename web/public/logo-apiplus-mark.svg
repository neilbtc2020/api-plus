<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ap_mark_bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="ap_mark_accent" x1="40" y1="60" x2="216" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="ap_mark_glow" x1="80" y1="80" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <filter id="ap_mark_blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#ap_mark_bg)"/>

  <!-- Subtle glow -->
  <circle cx="128" cy="128" r="72" fill="url(#ap_mark_glow)" filter="url(#ap_mark_blur)"/>

  <!-- Main symbol: < + -->
  <g stroke="url(#ap_mark_accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="130,72 76,128 130,184"/>
    <line x1="162" y1="104" x2="162" y2="152"/>
    <line x1="138" y1="128" x2="186" y2="128"/>
  </g>

  <!-- Node dots -->
  <circle cx="130" cy="72" r="5" fill="#818CF8"/>
  <circle cx="76" cy="128" r="5" fill="#38BDF8"/>
  <circle cx="130" cy="184" r="5" fill="#34D399"/>

  <!-- Border -->
  <rect x="1" y="1" width="254" height="254" rx="56" stroke="url(#ap_mark_accent)" stroke-width="1" opacity="0.15" fill="none"/>
</svg>
