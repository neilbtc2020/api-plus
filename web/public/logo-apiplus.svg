<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ap_bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="ap_accent" x1="40" y1="60" x2="216" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="ap_glow" x1="80" y1="80" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <filter id="ap_blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#ap_bg)"/>

  <!-- Subtle glow behind the mark -->
  <circle cx="128" cy="128" r="72" fill="url(#ap_glow)" filter="url(#ap_blur)"/>

  <!-- Geometric circuit lines (tech feel) -->
  <g stroke="url(#ap_accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.25">
    <line x1="24" y1="80" x2="56" y2="80"/>
    <line x1="56" y1="80" x2="56" y2="56"/>
    <line x1="200" y1="176" x2="232" y2="176"/>
    <line x1="200" y1="176" x2="200" y2="200"/>
    <circle cx="56" cy="56" r="3" fill="url(#ap_accent)" stroke="none"/>
    <circle cx="200" cy="200" r="3" fill="url(#ap_accent)" stroke="none"/>
  </g>

  <!-- Main API symbol: angle bracket < with plus + merged -->
  <g stroke="url(#ap_accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left angle bracket < representing API routing -->
    <polyline points="130,72 76,128 130,184"/>
    <!-- Plus + representing "Plus" -->
    <line x1="162" y1="104" x2="162" y2="152"/>
    <line x1="138" y1="128" x2="186" y2="128"/>
  </g>

  <!-- Small node dots at bracket endpoints -->
  <circle cx="130" cy="72" r="5" fill="#818CF8"/>
  <circle cx="76" cy="128" r="5" fill="#38BDF8"/>
  <circle cx="130" cy="184" r="5" fill="#34D399"/>

  <!-- Subtle border glow -->
  <rect x="1" y="1" width="254" height="254" rx="56" stroke="url(#ap_accent)" stroke-width="1" opacity="0.15" fill="none"/>
</svg>
